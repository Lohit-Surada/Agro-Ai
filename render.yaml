services:
  - type: web
    name: agro-ai-18
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 180
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DJANGO_DEBUG
        value: false
      - key: MONGO_RUN_STARTUP_PING
        value: false
